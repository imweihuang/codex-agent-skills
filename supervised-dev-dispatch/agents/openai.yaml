interface:
  display_name: "Supervised Dev Dispatch"
  short_description: "Coordinate one lead thread and isolated worker lanes safely"
  default_prompt: "Use $supervised-dev-dispatch as a continuous goal-loop: keep this thread as the single lead for communication, dispatch, review, and repo organization; do not create a separate dispatcher unless I explicitly ask; use peer-review with planning intensity for recursive task discovery and gate/critical intensity for merge, readiness, or protected-area decisions; classify worker effort as routine, complex, or critical and record the requested effort in each brief; keep up to 3 useful active worker lanes running until no safe useful tasks remain or I direct stop; before launch verify the ledger root and exact brief path; when a worker finishes, update the ledger before launching a replacement; if below cap with ready work, launch or record the hold reason; throttle new implementers when more than one code branch is awaiting lead review; record each worker as sidebar-visible thread, delegated worker thread, or fallback; use CI-soft draft PRs; and do not merge/deploy/live-mutate/destructively clean without explicit approval."
