interface:
  display_name: "Supervised Dev Dispatch"
  short_description: "Coordinate one lead thread and isolated worker lanes safely"
  default_prompt: "Use $supervised-dev-dispatch as a continuous goal-loop with one lead for communication, dispatch, verification, and repo organization. Keep isolated worker lanes moving through locally verified ready PRs, update the ledger before replacing finished workers, and throttle new implementers when review debt grows. External-model peer review is manual-only and never runs unless I explicitly ask. Do not merge, deploy, live-mutate, edit protected CI/workflows, or destructively clean without explicit approval."
